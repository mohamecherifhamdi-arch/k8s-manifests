apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-back
spec:
  replicas: 1
  selector:
    matchLabels:
      app: school-back
  template:
    metadata:
      labels:
        app: school-back
    spec:
      containers:
        - name: school-back
          image: school-back:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATA_MONGODB_URI
              value: mongodb://mongodb:27017/school_management
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8083
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: openai-api-key
---
apiVersion: v1
kind: Service
metadata:
  name: school-back
spec:
  type: NodePort
  selector:
    app: school-back
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
